<!-- Main App Content -->
<div class="app-container">
    <!-- Top static row -->
    <div class="top-row">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="Search">
            <button class="search-clear-button" style="display: none;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="action-buttons">
            <button class="refresh-button">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button class="add-button">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </div>

    <!-- Scrolling list -->
    <div class="list-container">
        <!-- List items will be dynamically added here -->
    </div>

    <!-- Pinned footer showing the user's Twilio number. Populated by main.js. -->
    <div class="my-number-bar" id="my-number-bar">
        <span class="my-number-label">My Number:</span>
        <span class="my-number-value" id="my-number-value">—</span>
        <button class="qr-share-button" id="qr-share-button" aria-label="Share signup QR code">
            <i class="fas fa-qrcode"></i>
        </button>
    </div>

    <!-- QR share modal. Native <dialog> gives us Esc-to-close and focus trap. -->
    <dialog class="qr-modal" id="qr-modal" aria-label="Signup QR code">
        <div class="qr-modal-panel">
            <button class="qr-modal-close" id="qr-modal-close" aria-label="Close" type="button">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="qr-modal-title">Share this app</h2>
            <p class="qr-modal-subtitle">Scan to sign up</p>
            <img class="qr-modal-image" id="qr-modal-image" alt="Signup QR code">
        </div>
    </dialog>
</div>
