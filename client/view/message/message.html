<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages - Mobile App</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/view/message/message-styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Top static row -->
        <div class="top-row">
            <button class="back-button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <!-- Contact name container (visible by default) -->
            <div class="contact-name-container">
                <span class="contact-name">Contact Name</span>
            </div>
            <!-- Search container (hidden by default) -->
            <div class="search-container" style="display: none;">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search">
                <button class="search-clear-button" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <!-- Search toggle button (replaces add button) -->
            <button class="search-toggle-button">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <!-- Message history container — populated from /messaging/thread/:userGuid on load -->
        <div class="message-container"></div>

        <!-- Message input box -->
        <div class="message-input-container">
            <div class="message-input-wrapper">
                <input type="text" class="message-input" placeholder="Type your message...">
                <button class="message-clear-button" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="message-send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <script src="message.js"></script>
</body>
</html>
