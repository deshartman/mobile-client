<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Contact Details</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/view/contact/contact-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="contact-container">
        <div class="top-bar">
            <button class="back-button">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h1>Contact Details</h1>
            <button class="clear-button">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div id="errorBanner" class="error-banner" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage"></span>
        </div>
        
        <div class="contact-form">
            <div class="profile-icon">
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                <label for="imageUpload" class="profile-icon-label">
                    <img id="profileImage" src="" alt="" style="display: none;">
                    <i class="fas fa-user-circle default-icon"></i>
                    <div class="upload-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </label>
            </div>
            
            <div class="form-group">
                <label for="companyName">Company Name</label>
                <input type="text" id="companyName" name="companyName">
            </div>
            
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            
            <div class="identities-section">
                <h2>Contact Methods</h2>
                <div id="identitiesContainer">
                    <!-- Identity fields will be dynamically added here -->
                </div>
            </div>
        </div>
    </div>
    <script src="contact.js" defer></script>
</body>
</html>
