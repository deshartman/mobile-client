<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Call Details - Mobile App</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/view/calldetail/calldetail.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="top-row">
            <button class="back-button" id="back-button" aria-label="Back">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="top-title" id="contact-name">Call</div>
        </div>

        <div class="call-detail-body">
            <div class="call-datetime" id="call-datetime"></div>
            <div class="transcript-container" id="transcript-container"></div>
            <div class="transcript-empty" id="transcript-empty" style="display: none;">
                No transcript available for this call.
            </div>
        </div>
    </div>
    <script src="calldetail.js"></script>
</body>
</html>
