<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Top static row -->
        <div class="top-row">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search">
                <button class="search-clear-button" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="add-button">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Scrolling list -->
        <div class="list-container">
            <!-- List items will be dynamically added here -->
        </div>
    </div>
    <!-- Templates -->
    <template id="activity-list-item">
        <div class="list-item">
            <div class="list-item-icon">
                <i class="icon-type"></i>
                <i class="fas fa-chevron-down dropdown-arrow"></i>
                <div class="dropdown-menu">
                    <div class="dropdown-item" data-action="call">
                        <i class="fas fa-phone"></i>
                        <span>Call</span>
                    </div>
                    <div class="dropdown-item" data-action="message">
                        <i class="fas fa-comment"></i>
                        <span>Message</span>
                    </div>
                    <div class="dropdown-item" data-action="whatsapp">
                        <i class="fab fa-whatsapp"></i>
                        <span>WhatsApp</span>
                    </div>
                </div>
            </div>
            <div class="list-item-content">
                <div class="content-wrapper">
                    <div class="title-row">
                        <div class="list-item-title"></div>
                        <div class="list-item-info-icon">
                            <i class="fas fa-info-circle"></i>
                        </div>
                    </div>
                    <div class="list-item-subtitle"></div>
                </div>
            </div>
            <div class="list-item-info">
                <div class="list-item-time"></div>
                <div class="list-item-duration"></div>
            </div>
        </div>
    </template>

    <template id="contact-list-item">
        <div class="list-item">
            <div class="list-item-icon">
                <i class="fas fa-user"></i>
                <i class="fas fa-chevron-down dropdown-arrow"></i>
                <div class="dropdown-menu">
                    <!-- Dropdown items will be dynamically populated based on contact identities -->
                </div>
            </div>
            <div class="list-item-content">
                <div class="content-wrapper">
                    <div class="title-row">
                        <div class="list-item-title"></div>
                        <div class="list-item-info-icon">
                            <i class="fas fa-info-circle"></i>
                        </div>
                    </div>
                    <div class="list-item-subtitle"></div>
                </div>
            </div>
            <div class="list-item-info">
                <div class="list-item-duration"></div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
