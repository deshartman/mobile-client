<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Import styles -->
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/components/ActivityListItem/ActivityListItem.css">
    <link rel="stylesheet" href="/components/ActivityList/ActivityList.css">
    <link rel="stylesheet" href="/view/main/main.css">
</head>
<body>
    <div id="app-root"></div>

    <script type="module">
        // First import main.js to ensure it's loaded
        import('/view/main/main.js')
            .then(async () => {
                try {
                    // Then load and inject HTML content
                    const response = await fetch('/view/main/main.html');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const html = await response.text();
                    document.getElementById('app-root').innerHTML = html;

                    // Finally, dispatch DOMContentLoaded to trigger initialization
                    // This ensures both the module and HTML content are ready
                    document.dispatchEvent(new Event('DOMContentLoaded'));
                } catch (error) {
                    console.error('Error loading application:', error);
                    document.getElementById('app-root').innerHTML = `
                        <div class="error-message">Error loading application. Please refresh the page.</div>
                    `;
                }
            })
            .catch(error => {
                console.error('Error importing main.js:', error);
                document.getElementById('app-root').innerHTML = `
                    <div class="error-message">Error initializing application. Please refresh the page.</div>
                `;
            });
    </script>
</body>
</html>
